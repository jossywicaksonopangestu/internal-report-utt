<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset Password</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background: #f6f8fc;
      font-family: Arial, sans-serif;
      color: #1f2937;
    "
  >
    <table
      role="presentation"
      width="100%"
      cellspacing="0"
      cellpadding="0"
      style="padding: 24px 12px"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="100%"
            cellspacing="0"
            cellpadding="0"
            style="
              max-width: 560px;
              background: #ffffff;
              border-radius: 14px;
              padding: 28px 24px;
              box-shadow: 0 10px 35px rgba(15, 23, 42, 0.08);
            "
          >
            <tr>
              <td>
                <h1
                  style="
                    margin: 0 0 12px;
                    font-size: 24px;
                    line-height: 1.2;
                    color: #222b68;
                  "
                >
                  Lupa Password?
                </h1>
                <p
                  style="
                    margin: 0 0 12px;
                    font-size: 15px;
                    line-height: 1.6;
                    color: #475569;
                  "
                >
                  Halo {{name}},
                </p>
                <p
                  style="
                    margin: 0 0 18px;
                    font-size: 15px;
                    line-height: 1.6;
                    color: #475569;
                  "
                >
                  Kami menerima permintaan untuk reset password akun Anda. Klik
                  tombol berikut untuk membuat password baru.
                </p>

                <p style="margin: 0 0 24px">
                  <a
                    href="{{resetUrl}}"
                    style="
                      display: inline-block;
                      background: #3b3f6f;
                      color: #ffffff;
                      text-decoration: none;
                      font-size: 15px;
                      font-weight: 700;
                      padding: 12px 18px;
                      border-radius: 10px;
                    "
                    target="_blank"
                    rel="noopener noreferrer"
                  >
                    Reset Password
                  </a>
                </p>

                <p style="margin: 0 0 6px; font-size: 13px; color: #64748b">
                  Link ini berlaku selama {{expiresMinutes}} menit.
                </p>
                <p style="margin: 0; font-size: 13px; color: #64748b">
                  Jika Anda tidak meminta reset password, abaikan email ini.
                </p>
              </td>
            </tr>
          </table>

          <p style="margin: 16px 0 0; font-size: 12px; color: #94a3b8">
            &copy; {{year}} Internal Report UTT
          </p>
        </td>
      </tr>
    </table>
  </body>
</html>
